<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VRTICS — Visual Sync V7.5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Tajawal:wght@400;700;900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --bg: #0f172a;
      --card: rgba(30, 41, 59, 0.7);
      --border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
    }

    nav {
      height: 70px;
      display: flex;
      align-items: center;
      padding: 0 40px;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 20px;
      box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 2.5fr 1fr;
      gap: 30px;
      padding: 30px 40px;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    .video-frame {
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .chat-card {
      background: var(--card);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: calc(100vh - 160px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .chat-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .message {
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-user {
      font-weight: 700;
      color: var(--primary);
      font-size: 13px;
    }

    .msg-content {
      font-size: 14px;
      margin-top: 4px;
      color: #e2e8f0;
    }

    .status-badge {
      padding: 4px 12px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    /* Diagnostic Panel */
    #diag-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 350px;
      background: rgba(0, 0, 0, 0.9);
      border: 1px solid #f00;
      border-radius: 10px;
      padding: 15px;
      font-family: monospace;
      font-size: 10px;
      color: #0f0;
      z-index: 1000;
      direction: ltr;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
    }

    .diag-title {
      font-weight: bold;
      border-bottom: 1px solid #444;
      margin-bottom: 5px;
      color: #f00;
    }

    .diag-log {
      max-height: 100px;
      overflow-y: auto;
      color: #aaa;
      margin-top: 5px;
    }

    @media (max-width: 1100px) {
      main {
        grid-template-columns: 1fr;
      }

      .chat-card {
        height: 500px;
      }

      #diag-panel {
        position: relative;
        width: 100%;
        bottom: 0;
        left: 0;
      }
    }
  </style>
</head>

<body>
  <div id="diag-panel">
    <div class="diag-title">VRTICS DIAGNOSTIC V7.5</div>
    <div id="diag-stats">
      VID: <span id="diag-vid">6_9ZiuONXt0</span><br>
      API: <span id="diag-api">WAITING</span><br>
      CONT: <span id="diag-cont">WAITING</span><br>
      PROXY: <span id="diag-proxy">WAITING</span>
    </div>
    <div class="diag-log" id="diag-log">Logs starting...</div>
  </div>

  <nav>
    <div class="brand">
      <div class="brand-logo">V</div><span style="font-weight:800;font-size:22px;">VRTICS LIVE</span>
    </div>
    <div class="status-badge" id="conn-status">جاري الاتصال...</div>
  </nav>
  <main>
    <section>
      <div class="video-frame"><iframe src="https://www.youtube.com/embed/6_9ZiuONXt0?autoplay=1"
          allowfullscreen></iframe></div>
      <h1 style="margin-top:20px; font-size:24px;">بث مباشر (تحقق بصري V7.5)</h1>
      <p style="color:var(--muted); font-size:14px; margin-top:10px;">لاحظ: إذا لم تظهر الرسائل، انسخ ما هو موجود في
        الصندوق الأحمر تحت وأرسله لي.</p>
    </section>
    <section class="chat-card">
      <div class="chat-header">
        <h3>المحادثة الفورية</h3><span id="msg-count" style="font-size:12px;color:var(--muted);">0 رسالة</span>
      </div>
      <div id="chatbox" class="chat-body">
        <div style="text-align:center;color:var(--muted);margin-top:40px;">في انتظار أول رسالة...</div>
      </div>
    </section>
  </main>

  <script>
    const VIDEO_ID = "6_9ZiuONXt0";
    const PROXIES = [
      "https://corsproxy.io/?",
      "https://api.allorigins.win/raw?url=",
      "https://api.codetabs.com/v1/proxy?quest="
    ];
    let pxIdx = 0;
    let apiKey, nextCont, clientVer, visitorData;
    let seen = new Set();

    function log(m) {
      console.log(m);
      const logDiv = document.getElementById("diag-log");
      logDiv.innerHTML += `<div>> ${m}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function init() {
      const currentProxy = PROXIES[pxIdx];
      document.getElementById("diag-proxy").innerText = currentProxy;
      log(`Testing Proxy: ${currentProxy}`);

      try {
        const url = encodeURIComponent('https://www.youtube.com/watch?v=' + VIDEO_ID);
        const res = await fetch(`${currentProxy}${url}`);
        const html = await res.text();

        log(`HTML Fetch: ${html.length > 1000 ? 'SUCCESS (' + html.length + ' bytes)' : 'FAIL/TOO SHORT'}`);

        apiKey = html.match(/"INNERTUBE_API_KEY":"([^"]+)"/)?.[1];
        clientVer = html.match(/"clientVersion":"([^"]+)"/)?.[1];
        visitorData = html.match(/"visitorData":"([^"]+)"/)?.[1];
        nextCont = html.match(/"continuation":"([^"]{80,})"/)?.[1] ||
          html.match(/"continuation":"([^"]+)"/)?.[1];

        document.getElementById("diag-api").innerText = apiKey ? "LOADED" : "MISSING";
        document.getElementById("diag-cont").innerText = nextCont ? "LOADED" : "MISSING";

        if (apiKey && nextCont) {
          log("Metadata Discovery: SUCCESS");
          return true;
        } else {
          log("Metadata Discovery: FAILED (Regex miss or block)");
          pxIdx = (pxIdx + 1) % PROXIES.length;
          return false;
        }
      } catch (e) {
        log(`Fetch ERROR: ${e.message}`);
        pxIdx = (pxIdx + 1) % PROXIES.length;
        return false;
      }
    }

    async function sync() {
      if (!apiKey || !nextCont) {
        log("No metadata. Attempting discovery...");
        if (!await init()) return setTimeout(sync, 5000);
      }

      try {
        const url = `https://www.youtube.com/youtubei/v1/live_chat/get_live_chat?key=${apiKey}`;
        const payload = {
          context: { client: { clientName: "WEB", clientVersion: clientVer, visitorData } },
          continuation: nextCont
        };

        const currentProxy = PROXIES[pxIdx];
        const res = await fetch(`${currentProxy}${encodeURIComponent(url)}`, {
          method: "POST",
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        log(`API Response: ${data.responseContext ? 'OK' : 'ERROR'}`);

        const chat = data.continuationContents?.liveChatContinuation;
        const c = chat?.continuations?.[0];

        if (c) {
          nextCont = c.invalidationContinuationData?.continuation ||
            c.timedContinuationData?.continuation ||
            nextCont;
          log("Continuation Updated");
        }

        const actions = chat?.actions || [];
        const box = document.getElementById("chatbox");
        let addedCount = 0;

        actions.forEach(a => {
          const m = a.addChatItemAction?.item?.liveChatTextMessageRenderer;
          if (m && !seen.has(m.id)) {
            seen.add(m.id);
            if (box.innerText.includes("في انتظار")) box.innerHTML = "";
            const author = m.authorName?.simpleText || "User";
            const text = m.message?.runs?.map(r => r.text || "").join("") || "";
            box.insertAdjacentHTML("beforeend", `<div class="message"><div class="msg-user">${author}</div><div class="msg-content">${text}</div></div>`);
            addedCount++;
          }
        });

        if (addedCount > 0) {
          box.scrollTop = box.scrollHeight;
          log(`Added ${addedCount} new messages.`);
        }

        document.getElementById("msg-count").innerText = `${seen.size} رسالة`;
        document.getElementById("conn-status").innerText = "متصل مباشر";

        setTimeout(sync, c?.timedContinuationData?.timeoutMs || 2500);
      } catch (e) {
        log(`SYNC ERROR: ${e.message}`);
        document.getElementById("conn-status").innerText = "إعادة المزامنة...";
        nextCont = null; // Reset on failure
        setTimeout(sync, 5000);
      }
    }

    log("VRTICS Engine Initializing...");
    sync();
  </script>
</body>

</html>
