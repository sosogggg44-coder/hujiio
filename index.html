<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VRTICS — Ultra Sync V7.4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Tajawal:wght@400;700;900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --bg: #0f172a;
      --card: rgba(30, 41, 59, 0.7);
      --border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
    }

    nav {
      height: 70px;
      display: flex;
      align-items: center;
      padding: 0 40px;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 20px;
      box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 2.5fr 1fr;
      gap: 30px;
      padding: 30px 40px;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    .video-frame {
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .chat-card {
      background: var(--card);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: calc(100vh - 160px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .chat-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .message {
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-user {
      font-weight: 700;
      color: var(--primary);
      font-size: 13px;
    }

    .msg-content {
      font-size: 14px;
      margin-top: 4px;
      color: #e2e8f0;
    }

    .status-badge {
      padding: 4px 12px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    @media (max-width: 1100px) {
      main {
        grid-template-columns: 1fr;
      }

      .chat-card {
        height: 500px;
      }
    }
  </style>
</head>

<body>
  <nav>
    <div class="brand">
      <div class="brand-logo">V</div><span style="font-weight:800;font-size:22px;">VRTICS LIVE</span>
    </div>
    <div class="status-badge" id="conn-status">جاري الاتصال...</div>
  </nav>
  <main>
    <section>
      <div class="video-frame"><iframe src="https://www.youtube.com/embed/6_9ZiuONXt0?autoplay=1"
          allowfullscreen></iframe></div>
      <h1 style="margin-top:20px; font-size:24px;">بث مباشر: 6_9ZiuONXt0</h1>
    </section>
    <section class="chat-card">
      <div class="chat-header">
        <h3>المحادثة الفورية</h3><span id="msg-count" style="font-size:12px;color:var(--muted);">0 رسالة</span>
      </div>
      <div id="chatbox" class="chat-body">
        <div style="text-align:center;color:var(--muted);margin-top:40px;">في انتظار أول رسالة...</div>
      </div>
    </section>
  </main>
  <script>
    const VIDEO_ID = "6_9ZiuONXt0";
    const PROXY = "https://corsproxy.io/?";
    let apiKey, nextCont, clientVer, visitorData;
    let seen = new Set();

    async function init() {
      try {
        const res = await fetch(`${PROXY}${encodeURIComponent('https://www.youtube.com/watch?v=' + VIDEO_ID)}`);
        const html = await res.text();
        apiKey = html.match(/"INNERTUBE_API_KEY":"([^"]+)"/)?.[1];
        clientVer = html.match(/"clientVersion":"([^"]+)"/)?.[1];
        visitorData = html.match(/"visitorData":"([^"]+)"/)?.[1];
        nextCont = html.match(/"continuation":"([^"]{80,})"/)?.[1];
        return !!(apiKey && nextCont);
      } catch (e) { return false; }
    }

    async function sync() {
      if (!apiKey && !await init()) return setTimeout(sync, 3000);
      try {
        const url = `https://www.youtube.com/youtubei/v1/live_chat/get_live_chat?key=${apiKey}`;
        const res = await fetch(`${PROXY}${encodeURIComponent(url)}`, {
          method: "POST",
          body: JSON.stringify({ context: { client: { clientName: "WEB", clientVersion: clientVer, visitorData } }, continuation: nextCont })
        });
        const data = await res.json();
        const chat = data.continuationContents?.liveChatContinuation;
        const c = chat?.continuations?.[0];
        nextCont = c?.invalidationContinuationData?.continuation || c?.timedContinuationData?.continuation || nextCont;

        const actions = chat?.actions || [];
        const box = document.getElementById("chatbox");
        actions.forEach(a => {
          const m = a.addChatItemAction?.item?.liveChatTextMessageRenderer;
          if (m && !seen.has(m.id)) {
            seen.add(m.id);
            if (box.innerText.includes("في انتظار")) box.innerHTML = "";
            const author = m.authorName?.simpleText || "User";
            const text = m.message?.runs?.map(r => r.text || "").join("") || "";
            box.insertAdjacentHTML("beforeend", `<div class="message"><div class="msg-user">${author}</div><div class="msg-content">${text}</div></div>`);
            box.scrollTop = box.scrollHeight;
          }
        });
        document.getElementById("msg-count").innerText = `${seen.size} رسالة`;
        document.getElementById("conn-status").innerText = "متصل مباشر";
        setTimeout(sync, c?.timedContinuationData?.timeoutMs || 2000);
      } catch (e) { document.getElementById("conn-status").innerText = "إعادة المزامنة..."; setTimeout(sync, 4000); }
    }
    sync();
  </script>
</body>

</html>
